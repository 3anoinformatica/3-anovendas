<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doces 3° Info</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a0014, #2b0040);
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

header h1{
    font-family: 'Pacifico', cursive;
    color:#ff66cc;
    font-size:32px;
}

/* PRODUTOS */
.container{
    padding:20px;
    max-width:900px;
    margin:auto;
}

.produto{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.produto:hover{
    transform:scale(1.02);
}

.info{
    display:flex;
    flex-direction:column;
}

.nome{
    font-size:18px;
}

.preco{
    color:#ff99dd;
}

/* BOTÕES */
.controles button{
    background: linear-gradient(45deg,#ff00aa,#8000ff);
    border:none;
    padding:10px;
    color:white;
    border-radius:10px;
    cursor:pointer;
    margin-left:5px;
    font-size:16px;
}

.controles button:hover{
    opacity:0.8;
}

/* GALERIA */
.galeria{
    margin-top:40px;
    text-align:center;
}

.galeria h2{
    color:#ff66cc;
}

.card-img{
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    max-width:250px;
    margin:20px auto;
    transition:0.3s;
}

.card-img:hover{
    transform:scale(1.05);
}

.card-img img{
    width:100%;
    border-radius:10px;
}

.card-img p{
    margin-top:10px;
}

/* CARRINHO */
.carrinho-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background: linear-gradient(45deg,#ff00aa,#8000ff);
    padding:15px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:none;
}

.overlay.active{
    display:block;
}

/* MENU CARRINHO */
.carrinho{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:#120012;
    padding:20px;
    border-radius:20px 20px 0 0;
    transition:0.4s;
}

.carrinho.active{
    bottom:0;
}

/* BOTÕES DO CARRINHO */
.finalizar{
    background:#00c853;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:10px;
    font-weight:bold;
}

.cancelar{
    background:#ff1744;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:10px;
}

.limpar{
    background:#555;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:10px;
}

</style>
</head>

<body>

<header>
<h1>🍬Doces 3° Info🍬</h1>
</header>

<div class="container">

<!-- PRODUTOS -->
<div class="produto">
<div class="info">
<span class="nome">Paçoca</span>
<span class="preco">R$0,50</span>
</div>
<div class="controles">
<button onclick="alterar('Paçoca',0.5,1)">+</button>
<button onclick="alterar('Paçoca',0.5,-1)">-</button>
</div>
</div>

<div class="produto">
<div class="info">
<span class="nome">Pirulito</span>
<span class="preco">R$1,00</span>
</div>
<div class="controles">
<button onclick="alterar('Pirulito',1,1)">+</button>
<button onclick="alterar('Pirulito',1,-1)">-</button>
</div>
</div>

<div class="produto">
<div class="info">
<span class="nome">Chiclete</span>
<span class="preco">R$0,50</span>
</div>
<div class="controles">
<button onclick="alterar('Chiclete',0.5,1)">+</button>
<button onclick="alterar('Chiclete',0.5,-1)">-</button>
</div>
</div>

<div class="produto">
<div class="info">
<span class="nome">Salgadinho</span>
<span class="preco">R$2,50</span>
</div>
<div class="controles">
<button onclick="alterar('Salgadinho',2.5,1)">+</button>
<button onclick="alterar('Salgadinho',2.5,-1)">-</button>
</div>
</div>

<!-- GALERIA -->
<div class="galeria">

<h2>🍬 Nossos Doces</h2>

<div class="card-img">
<img src=pacoca.png">
<p>Paçoca deliciosa 😋</p>
</div>

</div>

</div>

<!-- BOTÃO -->
<div class="carrinho-btn" onclick="toggleCarrinho()">
<i class="fas fa-shopping-cart"></i>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleCarrinho()"></div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<h2>Seu pedido</h2>
<div id="lista"></div>
<h3>Total: R$ <span id="total">0.00</span></h3>

<button class="finalizar" onclick="finalizar()">Finalizar no WhatsApp</button>
<button class="limpar" onclick="limpar()">Limpar carrinho</button>
<button class="cancelar" onclick="toggleCarrinho()">Cancelar</button>
</div>

<script>

let carrinho = {};

function alterar(nome, preco, quantidade){
    if(!carrinho[nome]){
        carrinho[nome] = {qtd:0, preco:preco};
    }
    carrinho[nome].qtd += quantidade;
    if(carrinho[nome].qtd < 0){
        carrinho[nome].qtd = 0;
    }
    atualizar();
}

function atualizar(){
    let lista = document.getElementById("lista");
    let total = 0;
    lista.innerHTML="";
    
    for(let item in carrinho){
        if(carrinho[item].qtd > 0){
            let subtotal = carrinho[item].qtd * carrinho[item].preco;
            total += subtotal;
            lista.innerHTML += `<p>${item} x${carrinho[item].qtd} - R$${subtotal.toFixed(2)}</p>`;
        }
    }

    document.getElementById("total").innerText = total.toFixed(2);
}

function toggleCarrinho(){
    document.getElementById("carrinho").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function limpar(){
    carrinho = {};
    atualizar();
}

function finalizar(){
    let mensagem = "Olá! Quero comprar:%0A";
    let total = 0;

    for(let item in carrinho){
        if(carrinho[item].qtd > 0){
            mensagem += `${item} x${carrinho[item].qtd}%0A`;
            total += carrinho[item].qtd * carrinho[item].preco;
        }
    }

    mensagem += `Total: R$${total.toFixed(2)}`;
    
    window.open(`https://wa.me/553898140575?text=${mensagem}`);
}

</script>

</body>
                                                </html>
