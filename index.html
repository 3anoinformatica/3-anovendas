<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doces 3° Informática</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#2b003f,#4b0082,#ff00aa);
min-height:100vh;
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:30px 20px;
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#ff00aa,#a200ff);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0; transform:translateY(-40px);}
to{opacity:1; transform:translateY(0);}
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
margin:15px 0;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.item:hover{
transform:scale(1.03);
}

.controls button{
border:none;
padding:10px 15px;
margin:0 3px;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.plus{
background:#ff00aa;
color:white;
}

.minus{
background:#a200ff;
color:white;
}

.controls button:hover{
transform:scale(1.2);
}

.cart-button{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#ff00aa,#a200ff);
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.cart-button:hover{
transform:scale(1.1);
}

.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:400px;
height:100%;
background:#1a0026;
padding:25px;
transition:0.5s;
overflow-y:auto;
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:15px;
}

.total{
margin:15px 0;
font-size:20px;
font-weight:600;
}

.finalizar, .cancelar{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.finalizar{
background:#25D366;
color:white;
}

.cancelar{
background:#ff0040;
color:white;
}

.finalizar:hover,.cancelar:hover{
transform:scale(1.05);
}

footer{
text-align:center;
padding:15px;
opacity:0.7;
font-size:13px;
}

</style>
</head>
<body>

<header>🍭 Doces 3° Informática 🍩</header>

<div class="container">

<div class="item">
<span>Paçoca - R$0,50</span>
<div class="controls">
<button class="minus" onclick="add('Paçoca',0.50,-1)">-</button>
<button class="plus" onclick="add('Paçoca',0.50,1)">+</button>
</div>
</div>

<div class="item">
<span>Pirulito - R$1,00</span>
<div class="controls">
<button class="minus" onclick="add('Pirulito',1.00,-1)">-</button>
<button class="plus" onclick="add('Pirulito',1.00,1)">+</button>
</div>
</div>

<div class="item">
<span>Chiclete - R$0,50</span>
<div class="controls">
<button class="minus" onclick="add('Chiclete',0.50,-1)">-</button>
<button class="plus" onclick="add('Chiclete',0.50,1)">+</button>
</div>
</div>

<div class="item">
<span>Salgadinho - R$3,00</span>
<div class="controls">
<button class="minus" onclick="add('Salgadinho',3.00,-1)">-</button>
<button class="plus" onclick="add('Salgadinho',3.00,1)">+</button>
</div>
</div>

</div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<h2>Seu Pedido</h2>
<div id="lista"></div>
<div class="total">Total: R$ <span id="total">0.00</span></div>
<button class="finalizar" onclick="finalizar()">Finalizar no WhatsApp</button>
<button class="cancelar" onclick="cancelar()">Cancelar Pedido</button>
</div>

<footer>
© 2026 Doces da Escola - Feito com 💜
</footer>

<script>
let carrinho={};

function add(nome,preco,qtd){
if(!carrinho[nome]){
carrinho[nome]={preco:preco,qtd:0};
}
carrinho[nome].qtd+=qtd;
if(carrinho[nome].qtd<=0){
delete carrinho[nome];
}
atualizar();
}

function atualizar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;

for(let item in carrinho){
let p=carrinho[item];
let subtotal=p.preco*p.qtd;
total+=subtotal;
lista.innerHTML+=`<p>${item} x${p.qtd} - R$${subtotal.toFixed(2)}</p>`;
}

document.getElementById("total").innerText=total.toFixed(2);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function finalizar(){
let mensagem="Pedido:%0A";
for(let item in carrinho){
mensagem+=`${item} x${carrinho[item].qtd}%0A`;
}
mensagem+=`Total: R$${document.getElementById("total").innerText}`;

window.open(`https://wa.me/553898140575?text=${mensagem}`);
}

function cancelar(){
carrinho={};
atualizar();
toggleCart();
}
</script>

</body>
    </html>
