<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doces 3° Informática</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#2b003f,#4b0082,#ff00aa);
min-height:100vh;
color:#89CFF0;
}

header{
text-align:center;
padding:30px;
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#ff00aa,#a200ff);
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
margin:15px 0;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

.controls button{
border:none;
padding:10px 15px;
margin:0 3px;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:white;
}

.plus{background:#ff00aa;}
.minus{background:#a200ff;}

.cart-button{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#ff00aa,#a200ff);
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:400px;
height:100%;
background:#1a0026;
padding:25px;
transition:0.5s;
overflow-y:auto;
}

.cart.active{right:0;}

.total{margin:15px 0;font-size:20px;font-weight:600;}

.finalizar,.cancelar{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.finalizar{background:#25D366;color:white;}
.cancelar{background:#ff0040;color:white;}

.confirmacao{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.confirmacao.active{
opacity:1;
pointer-events:all;
}

.confirm-box{
background:linear-gradient(135deg,#00ff88,#00cc66);
padding:40px;
border-radius:20px;
text-align:center;
color:#003322;
}

.confirm-box button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:white;
color:#00aa55;
font-weight:bold;
cursor:pointer;
display:block;
width:100%;
}
</style>
</head>

<body>

<header>🍭 Doces 3° Informática 🍩</header>

<div class="container">

<div class="item">
<span>Paçoca - R$0,50</span>
<div class="controls">
<button class="minus" onclick="addItem('Paçoca',0.50,-1)">-</button>
<button class="plus" onclick="addItem('Paçoca',0.50,1)">+</button>
</div>
</div>

<div class="item">
<span>Pirulito - R$1,00</span>
<div class="controls">
<button class="minus" onclick="addItem('Pirulito',1.00,-1)">-</button>
<button class="plus" onclick="addItem('Pirulito',1.00,1)">+</button>
</div>
</div>

<div class="item">
<span>Chiclete - R$0,25</span>
<div class="controls">
<button class="minus" onclick="addItem('Chiclete',0.50,-1)">-</button>
<button class="plus" onclick="addItem('Chiclete',0.50,1)">+</button>
</div>
</div>

</div>

<div class="cart-button" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<h2>Seu Pedido</h2>
<div id="lista"></div>
<div class="total">Total: R$ <span id="total">0.00</span></div>
<button class="finalizar" onclick="mostrarConfirmacao()">Finalizar no WhatsApp</button>
<button class="cancelar" onclick="cancelar()">Cancelar Pedido</button>
</div>

<div class="confirmacao" id="confirmacao">
<div class="confirm-box">
<h2>Pedido Confirmado 🎉</h2>
<button onclick="enviarWhats()">Enviar no WhatsApp</button>
<button onclick="fecharConfirmacao()">Voltar à Loja</button>
</div>
</div>

<script>
let cart={};

function addItem(name,price,quantity){
if(!cart[name]){cart[name]={price:price,quantity:0};}
cart[name].quantity+=quantity;
if(cart[name].quantity<=0){delete cart[name];}
updateCart();
}

function calcularPreco(item,quantidade,preco){

if(item==="Mini Donuts"){
let promo=Math.floor(quantidade/3)*5;
let resto=(quantidade%3)*2;
return promo+resto;
}

return preco*quantidade;
}

function updateCart(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;

for(let item in cart){
let data=cart[item];
let subtotal=calcularPreco(item,data.quantity,data.price);

total+=subtotal;

lista.innerHTML+=`<p>${item} x${data.quantity} - R$${subtotal.toFixed(2)}</p>`;
}

document.getElementById("total").innerText=total.toFixed(2);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function mostrarConfirmacao(){
document.getElementById("confirmacao").classList.add("active");
}

function enviarWhats(){

let mensagem="Pedido:%0A";

for(let item in cart){
mensagem+=`${item} x${cart[item].quantity}%0A`;
}

mensagem+=`Total: R$${document.getElementById("total").innerText}`;

let link=document.createElement("a");
link.href=`https://wa.me/553898140575?text=${mensagem}`;
link.target="_blank";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

fecharConfirmacao();
}

function fecharConfirmacao(){
document.getElementById("confirmacao").classList.remove("active");
cart={};
updateCart();
toggleCart();
}

function cancelar(){
cart={};
updateCart();
toggleCart();
}
</script>

</body>
    </html>
